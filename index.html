<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>하드웨어 진단 AI</title>
<style>
    body {
        font-family: 'Malgun Gothic', sans-serif;
        margin: 0; padding: 0;
        background-color: #B0E0E6;
    }
    header {
        text-align: center; padding: 20px;
        background-color: #1e293b; color: white;
    }
    
    /* 뼈대: 왼쪽과 오른쪽을 정렬하는 컨테이너 */
    .main-container {
        display: flex;
        max-width: 1400px;
        margin: 30px auto;
        gap: 20px; /* 좌우 박스 사이의 간격 */
        padding: 0 20px;
    }
    
    /* 왼쪽: 하드웨어 정보 입력 구역 */
    .left-side {
        flex: 1; /* 화면의 40% 정도 차지 */
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        min-height: 600px;
    }
    
    /* 오른쪽: AI 챗봇 구역 (위치 자체 변경 가능!) */
    .right-side {
        flex: 1.5; /* 화면의 60% 정도 차지 */
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        overflow: hidden;
    }
</style>
</head>
<body>

    <header>
        <h2>하드웨어 상태 진단 시스템</h2>
    </header>

    <div class="main-container">
        <div class="left-side">
            <h3>🖥️ 하드웨어 정보 입력</h3>
            <p>여기에 CPU, RAM 등의 선택 창을 만들 예정입니다.</p>
            </div>
        
        <div class="right-side">
            <iframe
             src="https://udify.app/chatbot/2pe7Gco4neuXmxlT"
             style="width: 100%; height: 100%; min-height: 700px; border: none;"
             allow="microphone">
            </iframe>
        </div>
    </div>

</body>
</html>
