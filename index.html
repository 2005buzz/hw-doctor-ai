<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>하드웨어 진단 AI</title>
<style>
    body {
        font-family: 'Malgun Gothic', sans-serif;
        margin: 0; padding: 0;
        background-color: #B0E0E6;
    }
    header {
        text-align: center; padding: 20px;
        background-color: #1e293b; color: white;
    }
    
    /* 뼈대: 왼쪽과 오른쪽을 정렬하는 컨테이너 */
    .main-container {
        display: flex;
        max-width: 1400px;
        margin: 30px auto;
        gap: 20px; /* 좌우 박스 사이의 간격 */
        padding: 0 20px;
    }
    
    /* 왼쪽: 하드웨어 정보 입력 구역 */
    .left-side {
        flex: 1; /* 화면의 40% 정도 차지 */
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        min-height: 600px;
    }
    
    /* 오른쪽: AI 챗봇 구역 (위치 자체 변경 가능!) */
    .right-side {
        flex: 1.5; /* 화면의 60% 정도 차지 */
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        overflow: hidden;
    }
</style>
</head>
<body>

    <header>
        <h2>하드웨어 상태 진단 시스템</h2>
    </header>

    <div class="main-container">
        <div class="left-side">
            <div class="left-side">
    <h3 style="margin-top: 0; color: #1e293b; font-size: 22px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
        🖥️ 하드웨어 정보 입력
    </h3>
    
    <form id="hardwareForm" style="display: flex; flex-direction: column; gap: 18px; margin-top: 20px;">
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;">1. 기기 유형</label>
            <label style="margin-right: 15px;"><input type="radio" name="device" value="desktop" checked> 데스크톱</label>
            <label><input type="radio" name="device" value="laptop"> 노트북</label>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;">2. CPU 제조사</label>
            <select name="cpu" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                <option value="intel">Intel (인텔)</option>
                <option value="amd">AMD (라이젠)</option>
                <option value="etc">기타 / 잘 모름</option>
            </select>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;">3. RAM 용량</label>
            <select name="ram" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                <option value="8">8GB 이하 (사무용 수준)</option>
                <option value="16">16GB (일반적인 게이밍/작업용)</option>
                <option value="32">32GB 이상 (고사양 작업용)</option>
            </select>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;">4. 현재 겪고 있는 증상 (중복 가능)</label>
            <div style="display: flex; flex-direction: column; gap: 8px; background: #f8fafc; padding: 12px; border-radius: 6px;">
                <label><input type="checkbox" name="symptom" value="heat"> 🔥 과도한 발열 및 팬 소음</label>
                <label><input type="checkbox" name="symptom" value="noise"> ⚡ 찌르르하는 고주파 소음</label>
                <label><input type="checkbox" name="symptom" value="vibe"> 📳 본체 진동 흔들림</label>
                <label><input type="checkbox" name="symptom" value="lag"> 🐌 게임/작업 중 렉, 느려짐</label>
            </div>
        </div>

        <button type="button" style="margin-top: 10px; padding: 14px; background: #1e293b; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s;">
            📋 시스템 상태 진단하기
        </button>
    </form>
</div>
            </div>
        
        <div class="right-side">
            <iframe
             src="https://udify.app/chatbot/2pe7Gco4neuXmxlT"
             style="width: 100%; height: 100%; min-height: 700px; border: none;"
             allow="microphone">
            </iframe>
        </div>
    </div>

</body>
</html>
