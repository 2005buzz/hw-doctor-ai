<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>하드웨어 진단 AI</title>
<style>
    body {
        font-family: 'Malgun Gothic', sans-serif;
        margin: 0; padding: 0;
        background-color: #cee5eb; /* 올려주신 이미지의 예쁜 민트빛 배경색 */
    }
    header {
        text-align: center; padding: 25px;
        background-color: #1e293b; color: white;
    }
    header h2 { margin: 0; font-size: 26px; }
    
    .main-container {
        display: flex;
        max-width: 1400px;
        margin: 30px auto;
        gap: 20px;
        padding: 0 20px;
    }
    
    .left-side {
        flex: 1;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    .right-side {
        flex: 1.5;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        overflow: hidden;
    }

    /* 결과창 디자인 */
    .result-box {
        display: none; /* 처음엔 숨겨둠 */
        margin-top: 20px;
        padding: 15px;
        background: #f8fafc;
        border-radius: 8px;
        border-left: 5px solid #ef4444;
    }
    .copy-btn {
        margin-top: 10px;
        padding: 8px 12px;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
</style>
</head>
<body>

    <header>
        <h2>하드웨어 상태 진단 시스템</h2>
    </header>

    <div class="main-container">
        <div class="left-side">
            <div style="text-align:center;">
        <img src="hardware-logo.png"
             alt="Hardware Diagnostic"
             style="width:80%; max-width:400px;">
    </div>

    <h3>정확한 하드웨어 점검을 위해 현재 컴퓨터 사양이 필요합니다.</h3>

    <p style="line-height:2;">
        1. 키보드의 <strong>[Windows 키 + R]</strong>을 누르고
        <strong>dxdiag</strong>를 입력 후 엔터를 쳐주세요.<br><br>

        2. 창이 뜨면 아래쪽의
        <strong>[모든 정보 저장]</strong>을 눌러 텍스트 파일(.txt)로 저장해 주세요.<br><br>

        3. 저장된 텍스트 파일을 열어 내용을 전체 복사
        (<strong>Ctrl+A → Ctrl+C</strong>)한 뒤,
        AI 채팅창에 붙여넣기
        (<strong>Ctrl+V</strong>) 해주시면 맞춤형 점검을 시작합니다.
    </p>
    </div>

    <script>
        function diagnoseSystem() {
            // 1. 입력한 값들 싹 모아오기
            const device = document.querySelector('input[name="device"]:checked').value;
            const cpu = document.querySelector('select[name="cpu"]').value;
            const ram = document.querySelector('select[name="ram"]').value;
            
            const symptoms = [];
            document.querySelectorAll('input[name="symptom"]:checked').forEach((checkbox) => {
                symptoms.push(checkbox.value);
            });

            // 2. 건강도 점수 계산하기 로직 (기본 100점 시작)
            let score = 100;
            score -= symptoms.length * 20; // 증상 하나당 20점씩 감점
            if (ram === "8GB 이하") score -= 10; // 램이 낮으면 추가 감점

            if (score < 0) score = 0;

            // 3. 점수에 따른 색상 및 평가
            let evaluation = "";
            const resultBox = document.getElementById('resultBox');
            if (score >= 80) {
                evaluation = "🟢 양호 (관리가 잘 됨)";
                resultBox.style.borderLeftColor = "#10b981";
            } else if (score >= 50) {
                evaluation = "🟡 주의 (점검 필요)";
                resultBox.style.borderLeftColor = "#f59e0b";
            } else {
                evaluation = "🔴 위험 (조치 시급)";
                resultBox.style.borderLeftColor = "#ef4444";
            }

            // 4. 화면에 결과 띄우기
            document.getElementById('healthScore').innerText = `나의 PC 건강도: ${score}점 [${evaluation}]`;
            
            // 5. AI에게 전달할 최적의 질문 텍스트 자동 조립
            let promptText = `안녕하세요! 제 컴퓨터 상태를 분석해 주세요.\n`;
            promptText += `- 기기 종류: ${device}\n`;
            promptText += `- CPU: ${cpu}\n`;
            promptText += `- RAM 용량: ${ram}\n`;
            promptText += `- 현재 증상: ${symptoms.length > 0 ? symptoms.join(', ') : '없음'}\n\n`;
            promptText += `위 사양과 증상을 바탕으로 구체적인 원인과 단계별 문제 해결 방안을 알려줘!`;

            document.getElementById('aiPrompt').innerText = promptText;
            
            // 결과창 부드럽게 보여주기
            resultBox.style.display = "block";
        }

        // 6. 질문 복사하기 기능
        function copyToClipboard() {
            const promptText = document.getElementById('aiPrompt').innerText;
            navigator.clipboard.writeText(promptText).then(() => {
                alert("질문이 복사되었습니다! 오른쪽 AI 챗봇 창에 [Ctrl + V]로 붙여넣어 상담을 시작하세요! 😃");
            }).catch(err => {
                alert("복사에 실패했습니다. 내용을 직접 드래그해 복사해 주세요.");
            });
        }
    </script>
</body>
</html>
